<style>

    --main: #62B0E2;

    --adv:  #238966;
    --prep: #8E44AD;
    --conj: #E67E22;
    --num:  #16A085;
    --intj: #C0392B;
    --pron: #7F8C8D;
    --aux:  #2C3E50;
    --bg: #FAFAFA;
    --card: #FFFFFF;
    --text: #222;
    --muted: #666;
    --line: #E5E5E5;
    --chip: #F2F2F2;
  }
  * { box-sizing: border-box; }
  body { margin:0; padding:0; font-family:"Meiryo","メイリオ","Malgun Gothic",sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.55; }
  header { background: var(--main); color:#fff; padding: 20px 28px;
    display:flex; align-items:baseline; gap:16px; }
  header h1 { margin:0; font-size:20px; font-weight:700; }
  header .sub { font-size:12px; opacity:0.9; }
  main { max-width:1100px; margin:0 auto; padding:24px; }

  .toolbar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; align-items:center; }
  .toolbar input, .toolbar select {
    padding:8px 12px; border:1px solid var(--line); border-radius:6px;
    font-size:14px; font-family:inherit; background:#fff; }
  .toolbar input { flex:1; min-width:200px; }
  .count { color:var(--muted); font-size:13px; margin-left:auto; }

  .pos-tabs { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
  .pos-tab {
    padding:6px 14px; border-radius:20px; font-size:13px; font-weight:700;
    border:2px solid var(--tc,#999); color:var(--tc,#999); background:#fff;
    cursor:pointer; font-family:inherit; }
  .pos-tab.active { background:var(--tc,#999); color:#fff; }
  .pos-tab .num { font-size:11px; opacity:0.85; margin-left:4px; }
  .pos-tab[data-pos="all"]  { --tc:#555; }
  .pos-tab[data-pos="verb"] { --tc: var(--main); }
  .pos-tab[data-pos="noun"] { --tc: var(--noun); }
  .pos-tab[data-pos="adj"]  { --tc: var(--adj); }
  .pos-tab[data-pos="adv"]  { --tc: var(--adv); }
  .pos-tab[data-pos="prep"] { --tc: var(--prep); }
  .pos-tab[data-pos="conj"] { --tc: var(--conj); }
  .pos-tab[data-pos="num"]  { --tc: var(--num); }
  .pos-tab[data-pos="intj"] { --tc: var(--intj); }
  .pos-tab[data-pos="pron"] { --tc: var(--pron); }
  .pos-tab[data-pos="aux"]  { --tc: var(--aux); }

  .legend { display:flex; gap:14px; flex-wrap:wrap; font-size:12px; color:var(--muted);
    padding:6px 2px 14px; }
  .legend span { display:inline-flex; align-items:center; gap:5px; }
  .legend .dot { width:10px; height:10px; border-radius:50%; display:inline-block; }

  .view-toggle { display:flex; gap:8px; margin-bottom:18px; }
  .btn { background:var(--main); color:#fff; border:none; padding:8px 14px;
    border-radius:6px; cursor:pointer; font-size:13px; font-weight:600; font-family:inherit; }
  .btn:hover { background: var(--main-dark); }
  .btn.secondary { background:#fff; color:var(--main); border:1px solid var(--main); }

  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(360px,1fr)); gap:16px; }
  .card {
    background:var(--card); border:1px solid var(--line); border-left:5px solid var(--pc,var(--main));
    border-radius:10px; padding:18px; display:flex; flex-direction:column; gap:10px;
    transition: box-shadow 0.15s; }
  .card:hover { box-shadow:0 2px 8px rgba(0,0,0,0.1); }
  .head-row { display:flex; gap:12px; align-items:flex-start; flex-direction:row-reverse; }
  .illus { width:72px; height:72px; flex-shrink:0; background:#F7FBFE; border-radius:8px; padding:6px; }
  .illus svg { width:100%; height:100%; }
  .head-text { flex:1; min-width:0; }
  .word-line { display:flex; align-items:baseline; gap:8px; flex-wrap:wrap; }
  .word { font-size:24px; font-weight:700; color:var(--pc,var(--main)); letter-spacing:0.3px; }
  .pos-tag, .tr-tag {
    font-size:11px; font-weight:700; padding:2px 7px; color:#fff; border-radius:10px; }
  .pos-tag { background: var(--pc,var(--main)); }
  .tr-tag { background: #777; }
  .ipa { color:var(--muted); font-size:13px; font-family:serif; }

  .meanings { display:grid; grid-template-columns:26px 1fr auto; gap:4px 10px; font-size:14px; align-items:center; }
  .meanings .flag { font-weight:600; color:var(--muted); font-size:12px; }
  .ko-rom { color:var(--muted); font-size:11px; display:block; font-style:italic; }
  .speak-btn {
    background:var(--chip); border:1px solid var(--line); color:var(--main-dark);
    width:26px; height:26px; border-radius:50%; cursor:pointer; font-size:13px;
    display:inline-flex; align-items:center; justify-content:center; padding:0; }
  .speak-btn:hover { background:var(--main); color:#fff; border-color:var(--main); }
  .speak-btn.sm { width:22px; height:22px; font-size:11px; flex-shrink:0; }

  .etym { background: color-mix(in srgb, var(--pc, var(--main)) 8%, #fff);
    border-left:3px solid var(--pc,var(--main)); border-radius:6px; padding:10px; font-size:13px; }
  .etym .parts { display:flex; gap:6px; align-items:center; margin-bottom:6px; font-weight:700; flex-wrap:wrap; }
  .etym .part { background: color-mix(in srgb, var(--pc, var(--main)) 18%, #fff);
    border:1px solid var(--pc,var(--main)); border-radius:4px; padding:2px 8px; color:var(--pc,var(--main-dark)); font-weight:700; }
  .etym .plus { color:var(--pc,var(--main-dark)); font-weight:700; }
  .etym .gloss { color:#444; font-size:12px; }
  .etym .gloss b { color: var(--pc, var(--main-dark)); font-weight:700; }

  .example { border-left:3px solid var(--pc,var(--main)); padding:8px 10px; font-size:13px; color:#333; background:#FAFAFA; }
  .sv-sentence { display:flex; flex-wrap:wrap; gap:4px 6px; align-items:flex-end; }
  .sv-token { display:inline-flex; flex-direction:column; align-items:center; line-height:1.2; }
  .sv-word { font-size:13px; padding-bottom:2px; }
  .sv-token.has-role .sv-word { border-bottom:2px solid var(--pc,var(--main-dark)); }
  .sv-role { font-size:10px; font-weight:700; color:var(--pc,var(--main-dark)); letter-spacing:0.5px; margin-top:2px; min-height:12px; }
  .example .ex-en-row { display:flex; align-items:flex-end; gap:6px; }
  .example .ex-en-row .sv-sentence { flex:1; }
  .example .ex-ja { color:var(--muted); font-size:12px; margin-top:4px; }
  .example .ex-ko { color:var(--muted); font-size:12px; display:flex; align-items:center; gap:6px; margin-top:4px; }
  .example .ex-ko span { flex:1; }

  .flashcard-mode { display:none; }
  .flashcard-mode.active { display:flex; flex-direction:column; align-items:center; gap:18px; padding:30px 20px; }
  .flashcard {
    width:min(560px,100%); min-height:360px; background:#fff;
    border:1px solid var(--line); border-left:5px solid var(--pc,var(--main));
    border-radius:14px; padding:26px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:12px; cursor:pointer; user-select:none; box-shadow:0 2px 12px rgba(0,0,0,0.05); }
  .flashcard .fc-illus { width:100px; height:100px; }
  .flashcard .fc-illus svg { width:100%; height:100%; }
  .flashcard .big { font-size:40px; font-weight:700; color:var(--pc,var(--main)); }
  .flashcard .reveal { display:none; text-align:center; width:100%; }
  .flashcard.flipped .reveal { display:block; }
  .flashcard .hint { color:var(--muted); font-size:11px; margin-top:6px; }

  .nav { display:flex; gap:10px; align-items:center; }
  .nav button { background:#fff; border:1px solid var(--main); color:var(--main);

  .nav button:hover { background:var(--main); color:#fff; }
  .progress { color:var(--muted); font-size:13px; min-width:60px; text-align:center; }
</style>
</head>

<div id="lockScreen" style="position:fixed;inset:0;z-index:9999;background:#FAFAFA;display:flex;align-items:center;justify-content:center;">
  <div style="text-align:center;font-family:'Meiryo',sans-serif;">
    <div style="font-size:48px;margin-bottom:16px;">&#128274;</div>
    <h2 style="margin:0 0 20px;font-size:18px;color:#222;">パスワードを入力してください</h2>
    <input id="pwInput" type="password" placeholder="Password"
      style="padding:10px 16px;font-size:16px;border:2px solid #E5E5E5;border-radius:8px;width:220px;text-align:center;font-family:inherit;"
      onkeydown="if(event.key==='Enter')checkPw()">
    <br>
    <button onclick="checkPw()"
      style="margin-top:12px;padding:10px 32px;font-size:15px;background:#62B0E2;color:#fff;border:none;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:700;">
      OK</button>
    <p id="pwError" style="color:#D82531;font-size:13px;margin-top:10px;visibility:hidden;">パスワードが違います</p>
  </div>
</div>
<script>
function checkPw(){
  var h='fb936a2c7e335a3f4fd2e97a87bb02bb591123baaeb2a8b66f5fc96a4b3c7810';
  crypto.subtle.digest('SHA-256',new TextEncoder().encode(document.getElementById('pwInput').value))
  .then(function(b){var a=Array.from(new Uint8Array(b)).map(function(x){return x.toString(16).padStart(2,'0')}).join('');
    if(a===h){document.getElementById('lockScreen').style.display='none';}
    else{document.getElementById('pwError').style.visibility='visible';}
  });
}
</script>

}

let DATA = null;
let filtered = [];
let fcIndex = 0;
let currentPos = 'all';

function load() {
  DATA = JSON.parse(document.getElementById('embeddedData').textContent);
  initRootFilter();
  updatePosCounts();
  applyFilters();
}

function initRootFilter() {
  const sel = document.getElementById('rootFilter');
  Object.entries(DATA.roots).sort((a, b) => a[0].localeCompare(b[0])).forEach(([k, v]) => {
    const opt = document.createElement('option');
    opt.value = k; opt.textContent = `${k} (${v.meaning_ja})`;
    sel.appendChild(opt);
  });
}

function updatePosCounts() {
  const counts = { all: DATA.words.length, verb:0, noun:0, adj:0, adv:0, prep:0, conj:0, num:0, intj:0, pron:0, aux:0 };
  DATA.words.forEach(w => counts[w.pos]++);
  ['all','verb','noun','adj','adv','prep','conj','num','intj','pron','aux'].forEach(k => {
    const el = document.getElementById('n-'+k);
    if (el) el.textContent = ` (${counts[k]})`;
  });
}

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const root = document.getElementById('rootFilter').value;
  filtered = DATA.words.filter(v => {
    if (currentPos !== 'all' && v.pos !== currentPos) return false;
    if (root && v.root !== root) return false;
    if (!q) return true;
    return [v.en, v.ja, v.ko, v.ko_rom, v.root, v.prefix, v.suffix].some(s => (s||'').toLowerCase().includes(q));
  });
  filtered.sort((a, b) => a.en.localeCompare(b.en));
  document.getElementById('count').textContent = `${filtered.length} 語表示`;
  renderList();
  fcIndex = 0; renderCard();
}

function speak(text, lang) {
  if (!('speechSynthesis' in window)) { alert('この環境では音声再生に対応していません'); return; }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang; u.rate = 0.9;
  window.speechSynthesis.speak(u);
}
function speakKo(text) { speak(text, 'ko-KR'); }
function speakEn(text) { speak(text, 'en-US'); }

function posColor(pos) {
  return { verb:'#62B0E2', noun:'#D82531', adj:'#F7B515', adv:'#238966', prep:'#8E44AD', conj:'#E67E22', num:'#16A085', intj:'#C0392B', pron:'#7F8C8D', aux:'#2C3E50' }[pos] || '#62B0E2';
}

function svSentenceHTML(sv) {
  return `<div class="sv-sentence">${sv.map(([w,r]) =>
    `<span class="sv-token${r ? ' has-role' : ''}"><span class="sv-word">${w}</span><span class="sv-role">${r||''}</span></span>`
  ).join('')}</div>`;
}

function svText(sv) {
  return sv.map(([w]) => w).join(' ');
}

function etymPartsHTML(v) {
  const parts = [];
  if (v.prefix) parts.push(`<span class="part">${v.prefix}</span>`);
  parts.push(`<span class="part">${v.root}</span>`);
  if (v.suffix) {
    v.suffix.split('+').forEach(s => parts.push(`<span class="part">${s}</span>`));
  }
  return parts.join('<span class="plus">+</span>');
}

function etymGloss(v) {
  const parts = [];
  if (v.prefix && DATA.prefixes[v.prefix]) {
    const p = DATA.prefixes[v.prefix];
    parts.push(`<b>${v.prefix}</b> = ${p.meaning_ja}`);
  }
  if (DATA.roots[v.root]) {
    parts.push(`<b>${v.root}</b> = ${DATA.roots[v.root].meaning_ja}`);
  }
  if (v.suffix) {
    v.suffix.split('+').forEach(s => {
      if (DATA.suffixes[s]) parts.push(`<b>${s}</b> = ${DATA.suffixes[s].meaning_ja}`);
    });
  }
  const glossLine = parts.join(' ／ ');
  const usageParts = [];
  if (v.prefix && DATA.prefixes[v.prefix]) {
    usageParts.push(`${v.prefix}-(${DATA.prefixes[v.prefix].meaning_ja})`);
  }
  if (DATA.roots[v.root]) {
    usageParts.push(`${v.root}(${DATA.roots[v.root].meaning_ja})`);
  }
  if (v.suffix) {
    v.suffix.split('+').forEach(s => {
      if (DATA.suffixes[s]) usageParts.push(`-${s}(${DATA.suffixes[s].meaning_ja})`);
    });
  }
  const usageLine = usageParts.length > 0
    ? `<div style="color:#888;font-size:11px;margin-top:3px;">${usageParts.join(' + ')} → ${v.ja}</div>`
    : '';
  return glossLine + usageLine;
}

function renderList() {
  const el = document.getElementById('listMode');
  el.innerHTML = '';
  filtered.forEach((v) => {
    const pc = posColor(v.pos);
    const posJa = DATA.pos[v.pos].ja;
    const card = document.createElement('div');
    card.className = 'card';
    card.style.setProperty('--pc', pc);
    const trBadge = v.pos === 'verb' ? `<span class="tr-tag">${v.tr}</span>` : '';
    const enText = svText(v.sv_en);
    card.innerHTML = `
      <div class="head-row">
        <div class="illus">${svgFor(v)}</div>
        <div class="head-text">
          <div class="word-line">
            <span class="word">${v.en}</span>
            <span class="pos-tag">${posJa}</span>
            ${trBadge}
          </div>
          <div class="ipa">${v.ipa}</div>
        </div>
      </div>
      <div class="meanings">
        <span class="flag">JP</span><span>${v.ja}</span><span></span>
        <span class="flag">KR</span>
        <span>${v.ko}<span class="ko-rom">${v.ko_rom}</span></span>
        <button class="speak-btn" data-ko="${v.ko}" title="韓国語を再生">🔊</button>
      </div>
      <div class="etym">
        <div class="parts">${etymPartsHTML(v)}</div>
        <div class="gloss">${etymGloss(v)}</div>
      </div>
      <div class="example">
        <div class="ex-en-row">
          ${svSentenceHTML(v.sv_en)}
          <button class="speak-btn sm" data-speak-en="${enText.replace(/"/g,'&quot;')}" title="英語を再生">🔊</button>
        </div>
        <div class="ex-ja">${v.example_ja}</div>
        <div class="ex-ko">
          <span>${v.example_ko}</span>
          <button class="speak-btn sm" data-speak-ko="${v.example_ko.replace(/"/g,'&quot;')}" title="韓国語を再生">🔊</button>
        </div>
      </div>
    `;
    el.appendChild(card);
  });
  el.querySelectorAll('[data-ko]').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); speakKo(btn.dataset.ko); }));
  el.querySelectorAll('[data-speak-ko]').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); speakKo(btn.dataset.speakKo); }));
  el.querySelectorAll('[data-speak-en]').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); speakEn(btn.dataset.speakEn); }));
}

function renderCard() {
  const fc = document.getElementById('flashcard');
  if (filtered.length === 0) {
    document.getElementById('fcWord').textContent = '—';
    document.getElementById('fcIpa').textContent = '';
    document.getElementById('fcIllus').innerHTML = '';
    document.getElementById('fcReveal').innerHTML = '';
    document.getElementById('progress').textContent = '0 / 0';
    return;
  }
  const v = filtered[fcIndex];
  const pc = posColor(v.pos);
  fc.style.setProperty('--pc', pc);
  const posJa = DATA.pos[v.pos].ja;
  const trBadge = v.pos === 'verb' ? ` <span class="tr-tag" style="font-size:12px;vertical-align:middle;">${v.tr}</span>` : '';
  document.getElementById('fcIllus').innerHTML = svgFor(v);
  document.getElementById('fcWord').innerHTML = `${v.en} <span class="pos-tag" style="font-size:12px;vertical-align:middle;">${posJa}</span>${trBadge}`;
  document.getElementById('fcIpa').textContent = v.ipa;
  const enText = svText(v.sv_en);
  document.getElementById('fcReveal').innerHTML = `
    <div style="font-size:18px;margin:10px 0;">🇯🇵 ${v.ja}</div>
    <div style="font-size:18px;margin:6px 0;">🇰🇷 ${v.ko} <button class="speak-btn" id="fcSpeak" title="韓国語を再生">🔊</button></div>
    <div class="ko-rom" style="margin-bottom:10px;">${v.ko_rom}</div>
    <div style="background:#F2F2F2;border-radius:6px;padding:10px;margin:10px 0;font-size:13px;">
      <div class="parts" style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:4px;">${etymPartsHTML(v)}</div>
      <div style="color:#666;font-size:12px;">${etymGloss(v)}</div>
    </div>
    <div style="display:flex;align-items:flex-end;gap:6px;justify-content:center;">
      ${svSentenceHTML(v.sv_en)}
      <button class="speak-btn sm" id="fcSpeakExEn" title="英語を再生">🔊</button>
    </div>
    <div style="font-size:12px;color:#666;margin-top:4px;">${v.example_ja}</div>
    <div style="font-size:12px;color:#666;display:flex;align-items:center;gap:6px;justify-content:center;">${v.example_ko} <button class="speak-btn sm" id="fcSpeakExKo" title="韓国語を再生">🔊</button></div>
  `;
  fc.classList.remove('flipped');
  document.getElementById('progress').textContent = `${fcIndex+1} / ${filtered.length}`;
  const bind = (id, fn) => { const b = document.getElementById(id); if (b) b.addEventListener('click', (e) => { e.stopPropagation(); fn(); }); };
  bind('fcSpeak', () => speakKo(v.ko));
  bind('fcSpeakExEn', () => speakEn(enText));
  bind('fcSpeakExKo', () => speakKo(v.example_ko));
}

function setMode(mode) {
  document.getElementById('listMode').style.display = mode === 'list' ? 'grid' : 'none';
  document.getElementById('cardMode').classList.toggle('active', mode === 'card');
  const listBtn = document.getElementById('listBtn');
  const cardBtn = document.getElementById('cardBtn');
  listBtn.classList.toggle('secondary', mode !== 'list');
  cardBtn.classList.toggle('secondary', mode !== 'card');
}

document.addEventListener('DOMContentLoaded', () => {
  load();
  document.getElementById('search').addEventListener('input', applyFilters);
  document.getElementById('rootFilter').addEventListener('change', applyFilters);
  document.querySelectorAll('.pos-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.pos-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentPos = tab.dataset.pos;
      applyFilters();
    });
  });
  document.getElementById('listBtn').addEventListener('click', () => setMode('list'));
  document.getElementById('cardBtn').addEventListener('click', () => setMode('card'));
  document.getElementById('flashcard').addEventListener('click', () => {
    document.getElementById('flashcard').classList.toggle('flipped');
  });
  document.getElementById('prev').addEventListener('click', () => {
    if (filtered.length === 0) return;
    fcIndex = (fcIndex - 1 + filtered.length) % filtered.length; renderCard();
  });
  document.getElementById('next').addEventListener('click', () => {
    if (filtered.length === 0) return;
    fcIndex = (fcIndex + 1) % filtered.length; renderCard();
  });
  document.getElementById('shuffle').addEventListener('click', () => {
    for (let i = filtered.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [filtered[i], filtered[j]] = [filtered[j], filtered[i]];
    }
    fcIndex = 0; renderCard(); renderList();
  });
});
</script>
</body>
</html>
